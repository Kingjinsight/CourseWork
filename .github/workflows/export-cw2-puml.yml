name: Export CW2 PUML to PNG

on:
  push:
    paths:
      - "CW2/*.puml"
      - ".github/workflows/export-cw2-puml.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Download PlantUML
        run: |
          curl -L -o plantuml.jar https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar

      - name: Export .puml files to CW2/ExportIMG as PNG
        run: |
          set -euo pipefail
          mkdir -p CW2/ExportIMG

          found=0
          while IFS= read -r -d '' file; do
            found=1
            name="$(basename "$file")"
            base="${name%.*}"

            java -jar plantuml.jar -tpng "$file"
            mv "${file%.*}.png" "CW2/ExportIMG/${base}.png"
          done < <(find CW2 -path "CW2/ExportIMG" -prune -o -type f -iname "*.puml" -print0)

          if [ "$found" -eq 0 ]; then
            echo "No .puml files found under CW2."
          fi

      - name: Create or update PR for exported PNGs
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto-export CW2 PUML to PNG [skip ci]"
          title: "chore: auto-export CW2 PUML to PNG"
          body: |
            Auto-generated PNG exports from `.puml` files under `CW2`.
          branch: "codex/auto-export-cw2-puml"
          delete-branch: true
          add-paths: |
            CW2/ExportIMG/*.png
            CW2/ExportIMG/**/*.png

      - name: Auto-approve PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review "${{ steps.cpr.outputs.pull-request-number }}" --approve --body "Auto-approved generated CW2 diagram export PR." || \
          echo "Auto-approve skipped (likely self-approval restricted by repository rules)."
