name: Export CW2 PUML to PNG

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "CW2/*.puml"
      - "CW2/**/*.puml"
      - ".github/workflows/export-cw2-puml.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    if: ${{ github.repository == 'Inf2-SEPP-CW-2026/CourseWork' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Download PlantUML
        run: |
          curl -L -o plantuml.jar https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar

      - name: Export .puml files to CW2/ExportIMG as PNG
        run: |
          set -euo pipefail
          mkdir -p CW2/ExportIMG
          find CW2/ExportIMG -type f -name "*.png" -delete

          found=0
          while IFS= read -r -d '' file; do
            found=1
            relative="${file#CW2/}"
            relative_dir="$(dirname "$relative")"
            base="$(basename "${relative%.*}")"

            java -jar plantuml.jar -tpng "$file"

            if [ "$relative_dir" = "." ]; then
              target_dir="CW2/ExportIMG"
            else
              target_dir="CW2/ExportIMG/$relative_dir"
              mkdir -p "$target_dir"
            fi

            mv "${file%.*}.png" "$target_dir/${base}.png"
          done < <(find CW2 -path "CW2/ExportIMG" -prune -o -type f -iname "*.puml" -print0)

          find CW2/ExportIMG -depth -mindepth 1 -type d -empty -delete

          if [ "$found" -eq 0 ]; then
            echo "No .puml files found under CW2."
          fi

      - name: Commit exported PNGs back to PR branch
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain --untracked-files=all -- CW2/ExportIMG)" ]; then
            echo "No PNG changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A CW2/ExportIMG
          git commit -m "chore: auto-export CW2 PUML to PNG [skip ci]"
          git push origin "HEAD:${BRANCH_NAME}"
